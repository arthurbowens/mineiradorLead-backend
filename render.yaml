# Blueprint Render — ajuste nomes no painel se quiser.
# Depois de criar o Postgres no Render, use "Connect" e ligue ao Web Service.
# Isso injeta DATABASE_URL (postgres://) — o app converte para JDBC automaticamente.

services:
  - type: web
    name: leadmaps-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:MaxRAMPercentage=75"
      # Gere um segredo forte (>= 32 chars) e cole no painel:
      - key: JWT_SECRET
        sync: false
      # Front: origem exata, separada por vírgula (sem / no fim). Vercel ex.:
      # https://mineirador-lead-frontend.vercel.app
      # Local + prod: http://localhost:4200,https://mineirador-lead-frontend.vercel.app
      - key: CORS_ORIGINS
        sync: false
